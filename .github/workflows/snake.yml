name: Generate Snake Animation

on:
  # 每 12 小时自动运行一次
  schedule:
    - cron: "0 */12 * * *"
  # 允许你手动点击按钮运行
  workflow_dispatch:
  # 每次你推送代码到 main 分支时也会运行
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          # github user name to read the contribution graph from (**required**)
          github_user_name: ${{ github.repository_owner }}
          # 自动生成两种主题的图片（珊瑚色 coral 配色）
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#D97757&color_dots=#F0EEE6,#EBC8B6,#E0A185,#D97757,#B85A3E
            dist/github-contribution-grid-snake-dark.svg?color_snake=#F0A07A&color_dots=#161B22,#5C3A2E,#9C5A40,#CC785C,#F0A07A
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 将生成的图片推送到 'output' 分支
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
